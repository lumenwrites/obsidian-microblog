name: Release Obsidian plugin

# Release flow: bump the version in manifest.json (+ versions.json), commit, push
# to main. This workflow reads the version FROM manifest.json and publishes a
# release tagged with it — so the tag can never drift from the manifest (that
# mismatch is what makes BRAT report "main.js missing"). If a release for the
# current version already exists, it skips cleanly (so ordinary commits that
# don't bump the version don't produce failed runs).
on:
  push:
    branches:
      - main

permissions:
  contents: write # needed to create the GitHub release + tag

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: meta
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Skip if this version was already released
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.meta.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.meta.outputs.version }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install & build (type-check + esbuild production)
        if: steps.check.outputs.exists == 'false'
        run: |
          npm ci
          npm run build

      - name: Create release with plugin assets
        if: steps.check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.version }}" \
            --title="${{ steps.meta.outputs.version }}" \
            --generate-notes \
            main.js manifest.json styles.css
